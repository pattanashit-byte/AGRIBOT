<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Agribot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
</head>
<body class="auth-page">
    <div class="background-grid"></div>

    <div class="page-shell">
        <nav class="topbar" aria-label="Primary navigation">
            <div class="brand">
                <div class="brand-mark">A</div>
                <div class="brand-copy">
                    <h1>AGRIBOT</h1>
                </div>
            </div>

            <button class="nav-toggle" type="button" aria-label="Toggle navigation" data-nav-toggle>
                ☰
            </button>

            <ul class="nav-links" data-nav-menu>
                <li><a href="/login">User Login</a></li>
                <li><a class="active" href="/register">Register</a></li>
                <li><a href="/admin-login">Admin Login</a></li>
            </ul>
        </nav>

        <main class="auth-shell compact">
            <section class="auth-layout single">
                <article class="glass-card auth-card" data-reveal>
                    <div class="form-header">
                        <p class="eyebrow">Account</p>
                        <h1 class="form-title">Register</h1>
                    </div>

                    <form id="registerForm" novalidate>
                        <div class="form-grid">
                            <div class="input-group">
                                <label for="register-name">Full Name</label>
                                <input id="register-name" class="field" type="text" name="name" placeholder="Full Name" required>
                            </div>
                            <div class="input-group">
                                <label for="register-city">City</label>
                                <input id="register-city" class="field" type="text" name="city" placeholder="City" required>
                            </div>
                            <div class="input-group full">
                                <label for="register-email">Email</label>
                                <input id="register-email" class="field" type="email" name="email" placeholder="Email" required>
                            </div>
                            <div class="input-group">
                                <label for="register-username">Username</label>
                                <input id="register-username" class="field" type="text" name="username" placeholder="Username" required>
                            </div>
                            <div class="input-group">
                                <label for="register-password">Password</label>
                                <input id="register-password" class="field" type="password" name="password" placeholder="Password" required minlength="8">
                            </div>
                        </div>

                        <div class="button-row single mt-4">
                            <button class="btn" type="submit">Register</button>
                        </div>
                    </form>

                    <div class="status-banner" id="authStatus" role="status" aria-live="polite"></div>

                    <p class="auth-footer">Already registered? <a href="/login">User Login</a></p>
                </article>
            </section>
        </main>
    </div>

    <script src="{{ url_for('static', filename='js/validation.js') }}"></script>
    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
</body>
</html>
